<script>
(function() {
'use strict';

// ── STATIONS ──────────────────────────────────────────────────────────────────
var STATIONS = [
  {
    key: "wjrn",
    name: "WJRN",
    frequency: 89.1,
    stream: "https://radio.jacewonmusic.com/listen/wjrn/radio.mp3",
    api: "https://radio.jacewonmusic.com/api/nowplaying/wjrn",
    description: "THIS IS WJRN – HOSTED BY JACEWON – BROADCASTING LIVE FROM CALIFORNIA – HOME OF THE ROCK GARDEN, BRIDGE CITY HANG SUITE, & GOLDEN BOOMBOX SESSIONS  "
  },
  {
    key: "rock_garden",
    name: "The Rock Garden",
    frequency: 95.5,
    stream: "https://radio.jacewonmusic.com/listen/the_rock_garden/radio.mp3",
    api: "https://radio.jacewonmusic.com/api/nowplaying/the_rock_garden",
    description: "THIS IS THE ROCK GARDEN – ALL VINYL CLASSIC ROCK, FUNK, BLUES & JAZZ – LIVE EVERY TUESDAY 7PM PACIFIC ON TWITCH.TV  "
  },
  {
    key: "bridge_city",
    name: "Bridge City Hang Suite",
    frequency: 102.7,
    stream: "https://radio.jacewonmusic.com/listen/bridge_city_hang_suite/radio.mp3",
    api: "https://radio.jacewonmusic.com/api/nowplaying/bridge_city_hang_suite",
    description: "THIS IS THE BRIDGE CITY HANG SUITE – GROWNFOLK R&B – LIVE EVERY WEDS 7PM PACIFIC ON TWITCH.TV  "
  },
  {
    key: "golden_boombox",
    name: "The Golden Boombox Sessions",
    frequency: 105.9,
    stream: "https://radio.jacewonmusic.com/listen/golden_boombox_sessions/radio.mp3",
    api: "https://radio.jacewonmusic.com/api/nowplaying/golden_boombox_sessions",
    description: "THIS IS THE GOLDEN BOOMBOX SESSIONS – GOLDEN ERA & FUTURE CLASSIC HIP-HOP – LIVE EVERY FRIDAY 7PM PACIFIC ON TWITCH.TV  "
  }
];

// ── STATE ─────────────────────────────────────────────────────────────────────
var playerState = 1; // 1=preplay, 2=playing, 3=paused
var currentStation = 0;
var currentTitle = '', currentArtist = '', currentArtUrl = '';
var activeArt = 'a';
var isTuning = false;
var metaInterval = null;
var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
var isPopout = window.location.search.includes('popout=true');

// "Synced" mode: embedded inline on the homepage hero, cross-frame linked to the
// main site's global player. Its own audio graph still runs (VU meter, ticker,
// art all stay real/alive) but output is never connected to speakers — the
// global MiniPlayer/station cards are the only audible source, so the two
// don't play the same stream out loud at once.
var isSynced = window.location.search.includes('sync=1');

function notifyStationChanged() {
  try {
    window.parent.postMessage({ source: 'wjrn-player', type: 'stationChanged', station: STATIONS[currentStation].key }, '*');
  } catch (e) {}
}

function notifyPlayStateChanged(playing) {
  try {
    window.parent.postMessage({ source: 'wjrn-player', type: 'playStateChanged', playing: playing, station: STATIONS[currentStation].key }, '*');
  } catch (e) {}
}

function notifyControl(control, value) {
  if (!isSynced) return;
  try {
    window.parent.postMessage({ source: 'wjrn-player', type: 'eqControl', control: control, value: value }, '*');
  } catch (e) {}
}

var bassActive = false, midActive = false, trebleActive = false;
var loudnessActive = false, monoActive = false, isMuted = false;
var savedGain = 0.8, balanceState = 0; // 0=center, 1=left, 2=right

// ── AUDIO NODES ───────────────────────────────────────────────────────────────
var audioCtx = null, audioEl = null, analyser = null;
var bassFilter = null, midFilter = null, trebleFilter = null;
var shaper = null, panner = null, gainNode = null, noiseGain = null;
var mediaSource = null;

// ── TICKER ────────────────────────────────────────────────────────────────────
var tickerMode = 'A'; // 'A'=static centered, 'B'=metadata scroll, 'C'=description scroll
var tickerPreTakeover = 'A';
var tickerTakeoverTimer = null;
var tickerX = 569;
var tickerContent = '';
var lastTickerTime = null;
var tickerWidth = 1;
var currentTickerText = '';

function setTickerStatic(text) {
  var wrap = document.getElementById('ticker-wrap');
  var el = document.getElementById('ticker-text');
  if (wrap && el) {
    wrap.style.display = 'flex';
    wrap.style.justifyContent = 'center';
    el.style.position = 'relative';
    el.style.left = 'auto';
    el.style.transform = 'translateX(0)';
    el.textContent = text;
  }
  tickerMode = 'A';
  currentTickerText = '';
}

function setTickerScroll(text, mode) {
  var wrap = document.getElementById('ticker-wrap');
  var el = document.getElementById('ticker-text');
  if (wrap && el) {
    if (tickerMode === mode && currentTickerText === text) {
      return;
    }
    currentTickerText = text;
    wrap.style.display = 'flex';
    wrap.style.justifyContent = 'flex-start';
    el.style.position = 'absolute';
    el.style.left = '0';
    tickerMode = mode;
    lastTickerTime = null;
    // Measure single-copy width then repeat for seamless loop
    el.textContent = text;
    var singleW = el.scrollWidth || 1;
    var repeats = Math.ceil(569 / singleW) + 1;
    tickerContent = text.repeat(repeats);
    el.textContent = tickerContent;
    tickerX = 569;
    tickerWidth = singleW;
    el.style.transform = 'translateX(' + tickerX + 'px)'; // prevent one-frame flash
  }
}

function tickerTakeover(text) {
  if (tickerTakeoverTimer) clearTimeout(tickerTakeoverTimer);
  tickerPreTakeover = tickerMode;
  setTickerStatic(text);
  tickerTakeoverTimer = setTimeout(function() {
    tickerTakeoverTimer = null;
    restoreTicker();
  }, 2500);
}

function restoreTicker() {
  if (playerState === 1) { setTickerStatic('CLICK ARTWORK OR TUNER TO BEGIN PLAYBACK'); return; }
  if (playerState === 3) { setTickerStatic('PAUSED – ' + STATIONS[currentStation].name.toUpperCase()); return; }
  if (tickerPreTakeover === 'C') {
    setTickerScroll(STATIONS[currentStation].description, 'C');
  } else {
    if (!currentTitle && !currentArtist) {
      return; // hold takeover message until fetch completes
    }
    setTickerScroll(buildMetaText(), 'B');
  }
}

function buildMetaText() {
  if (!currentTitle && !currentArtist) {
    return STATIONS[currentStation].name.toUpperCase() + ' –  ';
  }
  return (currentTitle || '–') + ' – ' + (currentArtist || '–') + ' – ' + STATIONS[currentStation].name.toUpperCase() + ' –  ';
}

// RAF ticker animation
function animateTicker(ts) {
  requestAnimationFrame(animateTicker);
  if (tickerMode !== 'B' && tickerMode !== 'C') return;
  if (!lastTickerTime) { lastTickerTime = ts; return; }
  var dt = (ts - lastTickerTime) / 1000;
  lastTickerTime = ts;
  if (dt > 0.1) dt = 0.1; // clamp for tab-switch catchup
  tickerX -= 50 * dt;
  if (tickerX <= -tickerWidth) {
    tickerX += tickerWidth;
  }
  var el = document.getElementById('ticker-text');
  if (el) {
    el.style.transform = 'translateX(' + tickerX + 'px)';
  }
}

// ── VU NEEDLE ─────────────────────────────────────────────────────────────────
var vuAngle = Math.PI / 4, vuTarget = Math.PI / 4;
var freqData = null;

function startVU() {
  freqData = new Uint8Array(analyser.frequencyBinCount);
}

function drawVU() {
  requestAnimationFrame(drawVU);
  if (analyser && playerState === 2 && freqData) {
    analyser.getByteFrequencyData(freqData);
    var sum = 0;
    for (var i = 2; i <= 12; i++) sum += freqData[i];
    var avg = sum / 11 / 255;
    
    // iOS Safari bypasses Web Audio API for live streams, meaning avg will be 0.
    // We simulate a rhythmic needle bounce so the visualizer operates on iOS.
    if (isIOS && avg === 0) {
      var now = Date.now() / 1000;
      var base = 0.18 + Math.sin(now * 12.5) * 0.08 + Math.cos(now * 6.25) * 0.05;
      avg = base + Math.random() * 0.08;
      if (Math.random() > 0.94) {
        avg += 0.2 + Math.random() * 0.15; // occasional drum beat / peak
      }
      avg = Math.max(0, Math.min(1, avg));
    }
    
    vuTarget = Math.PI / 4 + avg * (Math.PI / 2);
  } else {
    vuTarget = Math.PI / 4 + (Math.random() * 0.04 - 0.02);
  }
  var attack = (vuTarget > vuAngle) ? 0.25 : 0.04;
  vuAngle += (vuTarget - vuAngle) * attack;
  var canvas = document.getElementById('vu-canvas');
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 151, 79);
  var cx = 75.5, cy = 79, len = 60;
  var canvasAngle = Math.PI + vuAngle;
  var tx = cx + Math.cos(canvasAngle) * len;
  var ty = cy + Math.sin(canvasAngle) * len;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(tx, ty);
  ctx.strokeStyle = '#ff3333';
  ctx.lineWidth = 2;
  ctx.stroke();
}

// ── TUNER TICK ────────────────────────────────────────────────────────────────
function setTunerTick(freq) {
  var x = 659 + (freq - 88) * 20.8;
  document.getElementById('tuner-tick').style.left = x + 'px';
}

// ── ALBUM ART CROSSFADE ───────────────────────────────────────────────────────
function updateArt(url) {
  if (!url) return;
  var a = document.getElementById('art-a');
  var b = document.getElementById('art-b');
  var next = activeArt === 'a' ? b : a;
  var curr = activeArt === 'a' ? a : b;
  next.onload = function() {
    next.style.opacity = '1';
    setTimeout(function() { curr.style.opacity = '0'; }, 50);
    activeArt = activeArt === 'a' ? 'b' : 'a';
  };
  next.onerror = function() { next.style.opacity = '0'; };
  next.src = url;
}

function showArtOverlay(show) {
  document.getElementById('art-overlay').style.opacity = show ? '1' : '0';
}

// ── METADATA ──────────────────────────────────────────────────────────────────
function fetchMeta() {
  fetch(STATIONS[currentStation].api)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var np = d && d.now_playing && d.now_playing.song;
      if (np && (np.title || np.artist)) {
        currentTitle = np.title || '';
        currentArtist = np.artist || '';
        var artUrl = np.art || '';
        if (artUrl && artUrl !== currentArtUrl) {
          currentArtUrl = artUrl;
          updateArt(artUrl);
        }
      } else {
        currentTitle = 'LIVE STREAM';
        currentArtist = STATIONS[currentStation].name.toUpperCase();
      }
      if ((tickerMode === 'B' || (playerState === 2 && tickerMode === 'A' && !tickerTakeoverTimer)) && tickerPreTakeover !== 'C') {
        setTickerScroll(buildMetaText(), 'B');
      }
    })
    .catch(function() {
      currentTitle = 'LIVE STREAM';
      currentArtist = STATIONS[currentStation].name.toUpperCase();
      if ((tickerMode === 'B' || (playerState === 2 && tickerMode === 'A' && !tickerTakeoverTimer)) && tickerPreTakeover !== 'C') {
        setTickerScroll(buildMetaText(), 'B');
      }
    });
}

// ── AUDIO CURVE MAKERS ────────────────────────────────────────────────────────
function makeFlatCurve() {
  var c = new Float32Array(256);
  for (var i = 0; i < 256; i++) { c[i] = (i * 2 / 255) - 1; }
  return c;
}

function makeTubeCurve() {
  var c = new Float32Array(256);
  var drive = 4.0;
  var denom = Math.tanh(drive);
  for (var i = 0; i < 256; i++) {
    var x = (i * 2 / 255) - 1;
    c[i] = Math.tanh(drive * x) / denom;
  }
  return c;
}

// ── WHITE NOISE STATIC ────────────────────────────────────────────────────────
function makeNoiseBuf() {
  var buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
  var d = buf.getChannelData(0);
  for (var i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.8;
  return buf;
}

function playStatic(duration) {
  var src = audioCtx.createBufferSource();
  src.buffer = makeNoiseBuf();
  src.loop = true;
  src.connect(noiseGain);
  src.start();
  noiseGain.gain.cancelScheduledValues(audioCtx.currentTime);
  noiseGain.gain.setValueAtTime(0, audioCtx.currentTime);
  noiseGain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
  noiseGain.gain.setValueAtTime(0.3, audioCtx.currentTime + duration - 0.3);
  noiseGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
  setTimeout(function() { try { src.stop(); } catch(e) {} }, duration * 1000 + 100);
}

// ── INIT AUDIO ────────────────────────────────────────────────────────────────
function initAudio(startIndex) {
  if (audioCtx) return;
  if (typeof startIndex === 'number' && STATIONS[startIndex]) {
    currentStation = startIndex;
    setTunerTick(STATIONS[startIndex].frequency);
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;

  bassFilter = audioCtx.createBiquadFilter();
  bassFilter.type = 'lowshelf';
  bassFilter.frequency.value = 350;
  bassFilter.gain.value = 0;

  midFilter = audioCtx.createBiquadFilter();
  midFilter.type = 'peaking';
  midFilter.frequency.value = 1000;
  midFilter.Q.value = 0.7;
  midFilter.gain.value = 0;

  trebleFilter = audioCtx.createBiquadFilter();
  trebleFilter.type = 'highshelf';
  trebleFilter.frequency.value = 2500;
  trebleFilter.gain.value = 0;

  shaper = audioCtx.createWaveShaper();
  shaper.curve = makeFlatCurve();

  panner = audioCtx.createStereoPanner();
  panner.pan.value = 0;

  gainNode = audioCtx.createGain();
  gainNode.gain.value = savedGain;

  noiseGain = audioCtx.createGain();
  noiseGain.gain.value = 0;
  if (!isSynced) noiseGain.connect(audioCtx.destination);

  audioEl = new Audio();
  audioEl.crossOrigin = 'anonymous';
  audioEl.src = STATIONS[currentStation].stream;

  mediaSource = audioCtx.createMediaElementSource(audioEl);
  mediaSource.connect(analyser);
  analyser.connect(bassFilter);
  bassFilter.connect(midFilter);
  midFilter.connect(trebleFilter);
  trebleFilter.connect(shaper);
  shaper.connect(panner);
  panner.connect(gainNode);
  if (!isSynced) gainNode.connect(audioCtx.destination);

  audioEl.onplay = function() {
    playerState = 2;
    showArtOverlay(false);
    restoreTicker();
    notifyPlayStateChanged(true);
  };

  audioEl.onpause = function() {
    if (playerState !== 1) {
      playerState = 3;
      showArtOverlay(true);
      setTickerStatic('PAUSED – ' + STATIONS[currentStation].name.toUpperCase());
      notifyPlayStateChanged(false);
    }
  };

  startVU();
  audioEl.play().catch(function() {});
  notifyStationChanged();
  fetchMeta();
  metaInterval = setInterval(fetchMeta, 15000);
}

// ── PLAY / PAUSE ──────────────────────────────────────────────────────────────
function togglePlayPause() {
  if (!audioCtx) { initAudio(); return; }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (audioEl.paused) {
    audioEl.play().catch(function() {});
    showArtOverlay(false);
  } else {
    audioEl.pause();
    showArtOverlay(true);
  }
}

// ── CHANNEL SWITCH ────────────────────────────────────────────────────────────
function goToStation(targetIndex) {
  if (isTuning || !audioCtx || targetIndex === currentStation) return;
  isTuning = true;
  currentStation = targetIndex;
  var st = STATIONS[currentStation];
  tickerTakeover('TUNING TO ' + st.frequency + ' MHz – ' + st.name.toUpperCase());
  playStatic(1.5);
  setTunerTick(st.frequency);
  vuTarget = Math.PI / 4;
  setTimeout(function() {
    audioEl.src = st.stream;
    audioEl.play().catch(function() {});
    clearInterval(metaInterval);
    currentTitle = '';
    currentArtist = '';
    currentArtUrl = '';
    notifyStationChanged();
    fetchMeta();
    metaInterval = setInterval(fetchMeta, 15000);
  }, 1200);
  setTimeout(function() { isTuning = false; }, 2000);
}

function switchStation(dir) {
  if (isTuning || !audioCtx) { if (!audioCtx) { initAudio(); return; } return; }
  var d = (dir !== undefined) ? dir : 1;
  var target = (currentStation + d + STATIONS.length) % STATIONS.length;
  goToStation(target);
}

// ── RESPONSIVE SCALING ────────────────────────────────────────────────────────
function scalePlayer() {
  if (isPopout) {
    var scale = Math.min(window.innerWidth / 1280, window.innerHeight / 443);
    document.getElementById('scene').style.transform = 'scale(' + scale + ')';
  } else {
    var scale = Math.max(window.innerWidth / 1920, window.innerHeight / 1080);
    document.getElementById('scene').style.transform = 'scale(' + scale + ')';
  }
}

// ── HIT ZONE WIRING ───────────────────────────────────────────────────────────
document.getElementById('hz-tuner-screen').addEventListener('click', function() {
  if (playerState === 1) { initAudio(); } else { switchStation(); }
});

document.getElementById('hz-tuning-knob').addEventListener('click', function() {
  if (playerState === 1) { initAudio(); } else { switchStation(); }
});

document.getElementById('hz-art').addEventListener('click', function() {
  togglePlayPause();
});

document.getElementById('hz-ticker').addEventListener('click', function() {
  if (playerState !== 2) return;
  if (tickerMode === 'B') {
    setTickerScroll(STATIONS[currentStation].description, 'C');
  } else if (tickerMode === 'C') {
    setTickerScroll(buildMetaText(), 'B');
  }
});

document.getElementById('hz-logo').addEventListener('click', function() {
  window.open('https://radio.jacewonmusic.com', '_blank');
});

document.getElementById('hz-volume').addEventListener('click', function() {
  isMuted = !isMuted;
  if (gainNode) gainNode.gain.value = isMuted ? 0 : savedGain;
  tickerTakeover(isMuted ? 'MUTED' : 'VOLUME – RESTORED');
  notifyControl('mute', isMuted);
});

document.getElementById('hz-bass').addEventListener('click', function() {
  bassActive = !bassActive;
  if (bassFilter) bassFilter.gain.value = bassActive ? -16 : 0;
  tickerTakeover(bassActive ? 'BASS – CUT' : 'BASS – RESTORED');
  notifyControl('bass', bassActive);
});

document.getElementById('hz-mid').addEventListener('click', function() {
  midActive = !midActive;
  if (midFilter) midFilter.gain.value = midActive ? -12 : 0;
  tickerTakeover(midActive ? 'MID – CUT' : 'MID – RESTORED');
  notifyControl('mid', midActive);
});

document.getElementById('hz-treble').addEventListener('click', function() {
  trebleActive = !trebleActive;
  if (trebleFilter) trebleFilter.gain.value = trebleActive ? -16 : 0;
  tickerTakeover(trebleActive ? 'TREBLE – CUT' : 'TREBLE – RESTORED');
  notifyControl('treble', trebleActive);
});

document.getElementById('hz-balance').addEventListener('click', function() {
  balanceState = (balanceState + 1) % 3;
  var panVals = [0, -1.0, 1.0];
  var msgs = ['BALANCE – CENTER', 'BALANCE – LEFT CHANNEL', 'BALANCE – RIGHT CHANNEL'];
  if (panner) panner.pan.value = panVals[balanceState];
  tickerTakeover(msgs[balanceState]);
  notifyControl('balance', balanceState);
});

document.getElementById('hz-loudness').addEventListener('click', function() {
  loudnessActive = !loudnessActive;
  if (shaper) shaper.curve = loudnessActive ? makeTubeCurve() : makeFlatCurve();
  tickerTakeover(loudnessActive ? 'LOUDNESS – ON' : 'LOUDNESS – OFF');
  notifyControl('loudness', loudnessActive);
});

document.getElementById('hz-mono').addEventListener('click', function() {
  monoActive = !monoActive;
  if (panner && gainNode && audioCtx) {
    try { panner.disconnect(); } catch(e) {}
    if (monoActive) {
      var splitter = audioCtx.createChannelSplitter(2);
      var mergerM = audioCtx.createChannelMerger(2);
      panner.connect(splitter);
      splitter.connect(mergerM, 0, 0);
      splitter.connect(mergerM, 0, 1);
      mergerM.connect(gainNode);
    } else {
      panner.connect(gainNode);
    }
  }
  tickerTakeover(monoActive ? 'MONO – ON' : 'STEREO – RESTORED');
  notifyControl('mono', monoActive);
});

document.getElementById('hz-power').addEventListener('click', function() {
  if (!audioCtx) { initAudio(); return; }
  isMuted = !isMuted;
  if (gainNode) gainNode.gain.value = isMuted ? 0 : savedGain;
  tickerTakeover(isMuted ? 'POWER – OFF' : 'POWER – ON');
  notifyControl('mute', isMuted);
});

// ── INITIAL STATE ─────────────────────────────────────────────────────────────
if (isPopout) {
  var scene = document.getElementById('scene');
  if (scene) scene.classList.add('popout-mode');
}
scalePlayer();
window.addEventListener('resize', scalePlayer);

setTickerStatic('CLICK ARTWORK OR TUNER TO BEGIN PLAYBACK');
showArtOverlay(true);
setTunerTick(STATIONS[0].frequency);

// Start VU idle draw
requestAnimationFrame(drawVU);

// Start ticker RAF
requestAnimationFrame(animateTicker);

// Pre-load first station art
fetch(STATIONS[0].api)
  .then(function(r) { return r.json(); })
  .then(function(d) {
    var art = d && d.now_playing && d.now_playing.song && d.now_playing.song.art;
    if (art) {
      currentArtUrl = art;
      document.getElementById('art-a').src = art;
    }
  })
  .catch(function() {});

  // ── KEYBOARD / TV REMOTE NAVIGATION ──────────────────────────────────────────
  window.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'MediaTrackNext') {
      switchStation(1);
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown' || e.key === 'MediaTrackPrevious') {
      switchStation(-1);
    } else if (e.key === ' ' || e.key === 'Enter' || e.key === 'MediaPlayPause') {
      togglePlayPause();
    }
  });

  // ── CROSS-FRAME SYNC (embedded/synced mode only) ─────────────────────────────
  // Lets the main site's station cards / MiniPlayer drive this player, and vice
  // versa, so whichever station is live is reflected everywhere at once.
  if (isSynced) {
    window.addEventListener('message', function(e) {
      var data = e && e.data;
      if (!data || data.source !== 'wjrn-app') return;

      if (data.type === 'setStation') {
        var idx = -1;
        for (var i = 0; i < STATIONS.length; i++) {
          if (STATIONS[i].key === data.station) { idx = i; break; }
        }
        if (idx === -1) return;
        if (!audioCtx) {
          initAudio(idx);
        } else if (idx !== currentStation) {
          goToStation(idx);
        } else if (audioEl && audioEl.paused) {
          audioEl.play().catch(function() {});
        }
      } else if (data.type === 'play') {
        if (!audioCtx) { initAudio(); return; }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (audioEl && audioEl.paused) audioEl.play().catch(function() {});
      } else if (data.type === 'pause') {
        if (audioEl && !audioEl.paused) audioEl.pause();
      }
    });

    try { window.parent.postMessage({ source: 'wjrn-player', type: 'ready' }, '*'); } catch (e) {}
  }

})();
</script>
</body>
</html>
