<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WJRN Radio Player</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #player-scaler {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    #player {
      position: relative;
      width: 1280px;
      height: 443px;
      cursor: pointer;
      transform-origin: center center;
      flex-shrink: 0;
    }

    #faceplate {
      position: absolute;
      left: 0;
      top: 0;
      width: 1280px;
      height: 443px;
      z-index: 2;
      pointer-events: none;
      display: block;
    }

    #art-container {
      position: absolute;
      left: 111px;
      top: 101px;
      width: 274px;
      height: 274px;
      z-index: 1;
      background: #1a1a1a;
      overflow: hidden;
    }

    #art-a, #art-b {
      position: absolute;
      left: 0;
      top: 0;
      width: 274px;
      height: 274px;
      object-fit: cover;
      transition: opacity 0.8s ease;
    }

    #art-a {
      opacity: 1;
    }

    #art-b {
      opacity: 0;
    }

    #vu-canvas {
      position: absolute;
      left: 423px;
      top: 104px;
      width: 151px;
      height: 79px;
      z-index: 3;
    }

    #ticker-container {
      position: absolute;
      left: 410px;
      top: 214px;
      width: 569px;
      height: 48px;
      z-index: 3;
      overflow: hidden;
    }

    #ticker-text {
      position: absolute;
      white-space: nowrap;
      font-family: monospace;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #23bf91;
      text-shadow: 0 0 8px rgba(35, 191, 145, 0.6);
      line-height: 48px;
      top: 0;
      left: 0;
    }


    #ticker-idle {
      position: absolute;
      left: 410px;
      top: 214px;
      width: 569px;
      height: 48px;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #23bf91;
      text-shadow: 0 0 8px rgba(35, 191, 145, 0.6);
      pointer-events: none;
    }
    #ticker-idle.hidden { display: none; }

    #tuner-tick {
      position: absolute;
      top: 133px;
      width: 6px;
      height: 38px;
      background: #ff3333;
      z-index: 3;
      transition: left 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    #tuning-knob-hit {
      position: absolute;
      left: 993px;
      top: 212px;
      width: 188px;
      height: 67px;
      z-index: 4;
      cursor: pointer;
    }

    #volume-knob-hit {
      position: absolute;
      left: 1015px;
      top: 285px;
      width: 74px;
      height: 79px;
      z-index: 4;
      cursor: pointer;
    }


    #art-pause-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.52);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    #art-pause-overlay.visible { opacity: 1; }
    #art-pause-icon {
      color: rgba(255,255,255,0.88);
      font-size: 52px;
      line-height: 1;
      text-shadow: 0 0 24px rgba(255,255,255,0.4);
    }
  </style>
</head>
<body oncontextmenu="return false;">
  <div id="player-scaler">
  <div id="player">
    <!-- Album art — z-index:1, behind faceplate -->
    <div id="art-container">
      <div id="art-pause-overlay"><div id="art-pause-icon">&#9654;</div></div>
      <img id="art-a" src="/assets/images/jacewon-thumbnail.jpg" alt="">
      <img id="art-b" src="" alt="">
    </div>

    <!-- VU meter canvas — z-index:3 -->
    <canvas id="vu-canvas" width="151" height="79"></canvas>

    <!-- Metadata ticker — z-index:3 -->
    <div id="ticker-container">
      <span id="ticker-text"></span>
    </div>
    <div id="ticker-idle">CONNECTED TO WJRN – CLICK ANYWHERE TO LISTEN</div>

    <!-- Tuner tick — z-index:3 -->
    <div id="tuner-tick"></div>

    <!-- Faceplate PNG — z-index:2, pointer-events:none -->
    <img id="faceplate" src="./wjrn-receiver-front-ko.png" alt="">

    <!-- Hit zones — z-index:4 -->
    <div id="tuning-knob-hit"></div>
    <div id="volume-knob-hit"></div>

    <!-- Click to start prompt -->
  </div>

  <script>
    // ─── Station definitions ───────────────────────────────────────────────────
    const STATIONS = [
      {
        name: "WJRN",
        frequency: 98.7,
        stream: "https://radio.jacewonmusic.com/listen/wjrn/radio.mp3",
        api: "https://radio.jacewonmusic.com/api/nowplaying/wjrn"
      },
      {
        name: "The Rock Garden",
        frequency: 91.5,
        stream: "https://radio.jacewonmusic.com/listen/the_rock_garden/radio.mp3",
        api: "https://radio.jacewonmusic.com/api/nowplaying/the_rock_garden"
      },
      {
        name: "Bridge City Hang Suite",
        frequency: 94.3,
        stream: "https://radio.jacewonmusic.com/listen/bridge_city_hang_suite/radio.mp3",
        api: "https://radio.jacewonmusic.com/api/nowplaying/bridge_city_hang_suite"
      },
      {
        name: "The Golden Boombox",
        frequency: 105.1,
        stream: "https://radio.jacewonmusic.com/listen/golden_boombox_sessions/radio.mp3",
        api: "https://radio.jacewonmusic.com/api/nowplaying/golden_boombox_sessions"
      }
    ];

    // ─── State ─────────────────────────────────────────────────────────────────
    let currentStation = 0;
    let isTuning = false;
    let volume = 0.8;
    let isMuted = false;
    let lastTickerContent = '';

    let audioCtx = null;
    let analyser = null;
    let gainNode = null;
    let noiseGain = null;
    let audioEl = null;
    let metaPollInterval = null;
    let rafId = null;

    // VU meter state
    let vuAngle = Math.PI / 2;
    let vuTarget = Math.PI / 2;

    // Album art crossfade state
    let activeArt = 'a'; // 'a' or 'b'
    let currentArtUrl = '';

    // Ticker animation state
    let tickerRaf = null;
    let tickerStartTime = null;
    let tickerContent = '';
    let tickerTextWidth = 0;
    const TICKER_DURATION = 20000; // 20s per pass

    // ─── DOM refs ──────────────────────────────────────────────────────────────
    const playerEl     = document.getElementById('player');
    const vuCanvas     = document.getElementById('vu-canvas');
    const vuCtx        = vuCanvas.getContext('2d');
    const tickerEl     = document.getElementById('ticker-text');
    const tickerWrap   = document.getElementById('ticker-container');
    const tunerTick    = document.getElementById('tuner-tick');
    const tuningHit    = document.getElementById('tuning-knob-hit');
    const volumeHit    = document.getElementById('volume-knob-hit');
    const artA         = document.getElementById('art-a');
    const artB         = document.getElementById('art-b');

    // ─── Tuner tick position ───────────────────────────────────────────────────
    // 88 MHz → X:659, 108 MHz → X:1075 (416px / 20MHz = 20.8 px/MHz)
    function freqToX(freq) {
      return 659 + (freq - 88) * 20.8;
    }

    function updateTunerTick(freq) {
      const x = freqToX(freq);
      tunerTick.style.left = x + 'px';
    }

    // Initialize tick position
    updateTunerTick(STATIONS[currentStation].frequency);

    // ─── VU Meter drawing ──────────────────────────────────────────────────────
    const VU_CX = 75.5;
    const VU_CY = 79;
    const VU_LEN = 60;

    function drawVU() {
      vuCtx.clearRect(0, 0, 151, 79);

      // Draw needle
      const angle = Math.PI + vuAngle;
      const tipX = VU_CX + Math.cos(angle) * VU_LEN;
      const tipY = VU_CY + Math.sin(angle) * VU_LEN;

      vuCtx.beginPath();
      vuCtx.moveTo(VU_CX, VU_CY);
      vuCtx.lineTo(tipX, tipY);
      vuCtx.strokeStyle = '#ff3333';
      vuCtx.lineWidth = 2;
      vuCtx.lineCap = 'round';
      vuCtx.stroke();

      // Small pivot dot
      vuCtx.beginPath();
      vuCtx.arc(VU_CX, VU_CY, 3, 0, Math.PI * 2);
      vuCtx.fillStyle = '#ff3333';
      vuCtx.fill();
    }

    function vuLoop() {
      if (analyser) {
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);

        // Compute average level 0–1
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
        const avg = sum / dataArray.length / 255;

        // Map to angle range PI/4 → 3*PI/4
        vuTarget = Math.PI / 4 + avg * (Math.PI / 2);
      } else {
        vuTarget = Math.PI / 2;
      }

      // Inertia
      vuAngle += (vuTarget - vuAngle) * 0.08;
      drawVU();

      rafId = requestAnimationFrame(vuLoop);
    }

    // Draw idle needle immediately
    drawVU();

    // ─── Ticker / Marquee ─────────────────────────────────────────────────────
    function setTickerContent(content) {
      tickerContent = content;

      // Cancel existing animation
      if (tickerRaf) {
        cancelAnimationFrame(tickerRaf);
        tickerRaf = null;
      }

      tickerEl.textContent = content;
      tickerEl.style.transform = 'translateX(0px)';

      // Measure text width after one frame (DOM needs to render)
      requestAnimationFrame(() => {
        tickerTextWidth = tickerEl.offsetWidth;
        const containerWidth = tickerWrap.offsetWidth;

        // Start position: right edge of container
        tickerStartTime = null;
        const startX = containerWidth;

        function animateTicker(ts) {
          if (!tickerStartTime) tickerStartTime = ts;
          const elapsed = ts - tickerStartTime;

          // Total travel = containerWidth + textWidth (start at right, end when fully off-left)
          const totalTravel = containerWidth + tickerTextWidth;
          const progress = (elapsed % TICKER_DURATION) / TICKER_DURATION;
          const x = startX - progress * (startX + tickerTextWidth);

          tickerEl.style.transform = `translateX(${x}px)`;
          tickerRaf = requestAnimationFrame(animateTicker);
        }

        tickerRaf = requestAnimationFrame(animateTicker);
      });
    }

    // ─── Album art crossfade ───────────────────────────────────────────────────
    function updateArt(url) {
      if (!url || url === currentArtUrl) return;
      currentArtUrl = url;

      const incoming = activeArt === 'a' ? artB : artA;
      const outgoing = activeArt === 'a' ? artA : artB;

      incoming.onerror = () => {
        incoming.style.display = 'none';
      };

      incoming.onload = () => {
        incoming.style.display = '';
        incoming.style.opacity = '1';
        outgoing.style.opacity = '0';
        // Switch active track after fade completes
        setTimeout(() => {
          activeArt = activeArt === 'a' ? 'b' : 'a';
        }, 850);
      };

      incoming.src = url;
    }

    // ─── Metadata fetch ────────────────────────────────────────────────────────
    function fetchMeta(stationIndex) {
      const station = STATIONS[stationIndex];
      fetch(station.api)
        .then(r => r.json())
        .then(data => {
          const np = data.now_playing;
          const song = np && np.song ? np.song : null;
          const title = song ? (song.title || 'Unknown Title') : 'Unknown Title';
          const artist = song ? (song.artist || 'Unknown Artist') : 'Unknown Artist';
          const artUrl = song ? (song.art || '') : '';

          const content = `${station.name}   —   ${title}   —   ${artist}   `;
          setTickerContent(content);
          updateArt(artUrl);
        })
        .catch(() => {
          const content = `${station.name}   —   —   `;
          setTickerContent(content);
        });
    }

    function startMetaPoll(stationIndex) {
      if (metaPollInterval) clearInterval(metaPollInterval);
      fetchMeta(stationIndex);
      metaPollInterval = setInterval(() => fetchMeta(stationIndex), 15000);
    }

    // ─── White noise generator ─────────────────────────────────────────────────
    function createNoiseBuffer() {
      const sampleRate = audioCtx.sampleRate;
      const bufferSize = sampleRate * 2; // 2 seconds
      const buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * 0.8;
      }
      return buffer;
    }

    function playNoise(durationSec) {
      if (!audioCtx || !noiseGain) return;

      const noiseBuffer = createNoiseBuffer();
      const noiseSource = audioCtx.createBufferSource();
      noiseSource.buffer = noiseBuffer;
      noiseSource.loop = true;
      noiseSource.connect(noiseGain);
      noiseSource.start();

      const now = audioCtx.currentTime;
      // Fade in: 0 → 0.3 over 100ms
      noiseGain.gain.setValueAtTime(0, now);
      noiseGain.gain.linearRampToValueAtTime(0.3, now + 0.1);
      // Fade out: 0.3 → 0 starting at 1.1s, fully gone at 1.5s (100ms fade)
      noiseGain.gain.setValueAtTime(0.3, now + 1.1);
      noiseGain.gain.linearRampToValueAtTime(0, now + 1.5);

      // Stop source after duration
      setTimeout(() => {
        try { noiseSource.stop(); } catch(e) {}
        try { noiseSource.disconnect(); } catch(e) {}
      }, durationSec * 1000 + 100);
    }

    // ─── Audio init ────────────────────────────────────────────────────────────
    function initAudio() {
      if (audioCtx) return;

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // Analyser
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;

      // Gain for stream
      gainNode = audioCtx.createGain();
      gainNode.gain.value = volume;

      // Noise gain (for tuning static)
      noiseGain = audioCtx.createGain();
      noiseGain.gain.value = 0;

      // Audio element
      audioEl = new Audio();
      audioEl.crossOrigin = 'anonymous';
      audioEl.src = STATIONS[currentStation].stream;

      // Connect: audioEl → analyser → gainNode → destination
      const source = audioCtx.createMediaElementSource(audioEl);
      source.connect(analyser);
      analyser.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      // Connect noise: noiseGain → destination
      noiseGain.connect(audioCtx.destination);

      // Start playback
      audioEl.play().catch(e => console.warn('Autoplay blocked:', e));

      // Start VU animation
      vuLoop();

      // Hide idle overlay and start real content
      var ti = document.getElementById('ticker-idle'); if (ti) ti.classList.add('hidden');
      // Start metadata polling
      startMetaPoll(currentStation);
}

    // ─── Station switch ────────────────────────────────────────────────────────
    function switchStation() {
      if (isTuning) return;
      isTuning = true;

      // Advance station index
      currentStation = (currentStation + 1) % STATIONS.length;
      const newStation = STATIONS[currentStation];

      // Play static noise
      playNoise(1.5);

      // Move tuner tick immediately (CSS transition handles animation)
      updateTunerTick(newStation.frequency);

      // Rest needle to center during static
      vuTarget = Math.PI / 2;

      // Reset ticker to station name during static
      setTickerContent(`${newStation.name}   —   TUNING...   —   `);

      // At 1200ms: switch stream and start metadata
      setTimeout(() => {
        if (audioEl) {
          audioEl.pause();
          audioEl.src = newStation.stream;
          audioEl.play().catch(e => console.warn('Play blocked:', e));
        }
        // Clear art during switch
        startMetaPoll(currentStation);
      }, 1200);

      // At 2000ms: done tuning
      setTimeout(() => {
        isTuning = false;
      }, 2000);
    }

    // ─── Volume control ────────────────────────────────────────────────────────
    function adjustVolume(delta) {
      volume = Math.min(1, Math.max(0, volume + delta));
      if (gainNode) gainNode.gain.value = volume;
    }

    // ─── Event handlers ────────────────────────────────────────────────────────

    // Tuning knob click
    tuningHit.addEventListener('click', function(e) {
      e.stopPropagation();

      // Init audio on first click
      if (!audioCtx) {
        initAudio();
        // Small delay to let audio init before switching
        setTimeout(() => switchStation(), 100);
        return;
      }

      if (audioCtx.state === 'suspended') audioCtx.resume();
      switchStation();
    });

    // Volume knob click — toggle mute
    volumeHit.addEventListener('click', function(e) {
      e.stopPropagation();

      if (!audioCtx) {
        initAudio();
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

      isMuted = !isMuted;
      if (gainNode) gainNode.gain.value = isMuted ? 0 : volume;
    });

    // Volume knob scroll wheel
    volumeHit.addEventListener('wheel', function(e) {
      e.preventDefault();
      e.stopPropagation();

      if (!audioCtx) {
        initAudio();
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

      adjustVolume(e.deltaY > 0 ? -0.1 : 0.1);
    }, { passive: false });

    // Player body click — init audio
    playerEl.addEventListener('click', function(e) {
      if (!audioCtx) {
        initAudio();
      } else if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    });

    // Art & ticker click — toggle play/pause
    const artPauseOverlay = document.getElementById('art-pause-overlay');

    function setPausedUI(paused) {
      if (paused) {
        artPauseOverlay.classList.add('visible');
        setTickerContent('PAUSED   —   CLICK ARTWORK OR METADATA TO RESUME   —   ', true);
      } else {
        artPauseOverlay.classList.remove('visible');
        if (lastTickerContent) setTickerContent(lastTickerContent, false);
      }
    }

    function togglePlayPause() {
      if (!audioCtx) {
        initAudio();
        return;
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      if (audioEl.paused) {
        audioEl.play().catch(function(){});
        setPausedUI(false);
      } else {
        audioEl.pause();
        setPausedUI(true);
      }
    }
    document.getElementById('art-container').addEventListener('click', function(e) { e.stopPropagation(); togglePlayPause(); });
    tickerWrap.addEventListener('click', function(e) { e.stopPropagation(); togglePlayPause(); });

        // Handle page visibility — resume AudioContext if needed
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden && audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    });

    // ─── Fetch live art on load, falls back to placeholder already in HTML ───────
    fetch('https://radio.jacewonmusic.com/api/nowplaying/wjrn')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var art = data && data.now_playing && data.now_playing.song && data.now_playing.song.art;
        if (art) { artA.src = art; }
      })
      .catch(function() {});

    // ─── Responsive scaling ───────────────────────────────────────────────────────
    function scalePlayer() {
      var vw = window.innerWidth;
      var vh = window.innerHeight;
      var scale = Math.min(vw / 1280, vh / 443);
      document.getElementById('player').style.transform = 'scale(' + scale + ')';
    }
    scalePlayer();
    window.addEventListener('resize', scalePlayer);
  </script>
</body>
</html>
