# HTTP - Redirect all traffic to HTTPS, except ACME challenges
server {
    listen 80;
    listen [::]:80;
    server_name radio.jacewonmusic.com;

    # Pass Let's Encrypt renewals through to AzuraCast
    location /.well-known/acme-challenge/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect regular web traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Serve custom landing page at root and proxy all other paths to AzuraCast
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name radio.jacewonmusic.com;

    # Use the SSL certificate generated and managed by AzuraCast's Docker setup
    ssl_certificate /var/lib/docker/volumes/azuracast_acme/_data/acme.crt;
    ssl_certificate_key /var/lib/docker/volumes/azuracast_acme/_data/acme.key;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # Allow large file uploads (show recordings can be several GB)
    client_max_body_size 2G;

    # Support long-lived connections for audio streaming
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
    send_timeout 300;

    # Serve the static landing page ONLY for the exact root URL (radio.jacewonmusic.com/)
    location = / {
        root /var/www/wjrn-landing;
        index index.html;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Serve the static landing page for the /retro route and any children
    location /retro {
        root /var/www/wjrn-landing;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Station landing pages
    location /the-rock-garden {
        root /var/www/wjrn-landing;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
    location /bridge-city-hang-suite {
        root /var/www/wjrn-landing;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
    location /the-golden-boombox {
        root /var/www/wjrn-landing;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Vintage receiver standalone player
    location = /player {
        return 301 /player/;
    }
    location /player/ {
        root /var/www/wjrn-landing;
        try_files $uri $uri/index.html =404;
    }

    # Serve static assets directly from /var/www/wjrn-landing if they exist, fallback to AzuraCast
    location / {
        root /var/www/wjrn-landing;
        try_files $uri @azuracast;
    }

    # Proxy all other paths (login, admin dashboard, APIs, stream mountpoints) to AzuraCast
    location @azuracast {
        # Proxy pass to AzuraCast container mapped to 8443
        proxy_pass https://127.0.0.1:8443;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_set_header X-Forwarded-Port 443;

        # WebSocket support for live now-playing metrics on AzuraCast Admin panel
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Turn off buffering to allow streaming audio
        proxy_buffering off;

        # Inject WJRN admin workflow notes into AzuraCast HTML pages.
        # Disable upstream gzip so sub_filter can read the response body.
        proxy_set_header Accept-Encoding "";
        sub_filter '</body>' '<script src="/admin-notes.js"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
